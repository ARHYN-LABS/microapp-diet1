workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Prebuild Android project
        script: cd apps/mobile && npx expo prebuild --platform android --clean
      - name: Build debug APK
        script: cd apps/mobile/android && ./gradlew assembleDebug
    artifacts:
      - apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
  android-release:
    name: Android Release APK (test)
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      groups:
        - keystore
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch Expo FormData crash in winter runtime
        script: |
          python3 - <<'PY'
          import glob, os
          targets = glob.glob("node_modules/expo/src/winter/runtime.native.*")
          targets += glob.glob("node_modules/expo/build/winter/runtime.native.*")
          patched = 0
          for fp in targets:
              with open(fp) as f:
                  text = f.read()
              if "installFormDataPatch(FormData)" in text and "typeof FormData" not in text:
                  new_text = text.replace(
                      "installFormDataPatch(FormData);",
                      "if (typeof FormData !== 'undefined') { installFormDataPatch(FormData); }"
                  )
                  if new_text == text:
                      new_text = text.replace(
                          "installFormDataPatch(FormData)",
                          "(typeof FormData !== 'undefined' && installFormDataPatch(FormData))"
                      )
                  if new_text != text:
                      with open(fp, 'w') as f:
                          f.write(new_text)
                      patched += 1
                      print(f"Patched: {fp}")
              else:
                  print(f"Already patched or no match: {fp}")
          print(f"Patched {patched} files")
          PY
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Prebuild Android project
        script: |
          cd apps/mobile
          npx expo prebuild --platform android --clean
      - name: Force react-android to 0.81.5 (prevent Maven 0.82 cycle)
        script: |
          cd apps/mobile/android
          python3 - build.gradle <<'PY'
          import sys
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()

          force_block = "\nsubprojects {\n    configurations.all {\n        resolutionStrategy {\n            force 'com.facebook.react:react-android:0.81.5'\n            force 'com.facebook.react:react-native:0.81.5'\n            force 'com.facebook.react:hermes-android:0.81.5'\n        }\n    }\n}\n"
          if 'resolutionStrategy' not in text:
              text += force_block
              print("Added dependency resolution force to root build.gradle")
          else:
              print("resolutionStrategy already present")

          with open(gradle, 'w') as f:
              f.write(text)
          PY
      - name: Ensure newArchEnabled in gradle.properties
        script: |
          cd apps/mobile/android
          echo "=== Current gradle.properties (newArch related) ==="
          grep -i "newArch\|new_arch\|NEW_ARCH" gradle.properties || echo "No newArch property found!"
          # Ensure newArchEnabled=true is set — required by native module build.gradle
          # files (e.g. gesture-handler) to enable codegen and C++ JSI bindings
          if grep -q "newArchEnabled" gradle.properties; then
            echo "newArchEnabled already present"
          else
            echo "" >> gradle.properties
            echo "newArchEnabled=true" >> gradle.properties
            echo "Added newArchEnabled=true to gradle.properties"
          fi
          # Limit to ARM architectures only (reduces APK from ~104MB to ~40MB)
          if grep -q "reactNativeArchitectures" gradle.properties; then
            sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=armeabi-v7a,arm64-v8a/' gradle.properties
          else
            echo "reactNativeArchitectures=armeabi-v7a,arm64-v8a" >> gradle.properties
          fi
          echo ""
          echo "=== Full gradle.properties ==="
          cat gradle.properties
      - name: Fix autolinking for monorepo
        script: |
          cd apps/mobile
          # Generate community CLI config from correct working directory (apps/mobile/)
          # Gradle runs autolinking from android/ dir which can't find packages
          npx @react-native-community/cli config > android/rn-cli-config.json
          node -e "const c=require('./android/rn-cli-config.json'); console.log('Autolinking deps:', Object.keys(c.dependencies||{}).join(', '))"

          # Patch settings.gradle to use pre-generated config instead of running command
          python3 - <<'PY'
          import os
          settings_path = "android/settings.gradle"
          config_path = os.path.abspath("android/rn-cli-config.json")

          with open(settings_path) as f:
              text = f.read()

          # Replace both autolinking branches with cat command that reads our config
          patched = 0
          old1 = "ex.autolinkLibrariesFromCommand()"
          new1 = f'ex.autolinkLibrariesFromCommand(["cat", "{config_path}"])'
          if old1 in text:
              text = text.replace(old1, new1)
              patched += 1

          old2 = "ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)"
          new2 = f'ex.autolinkLibrariesFromCommand(["cat", "{config_path}"])'
          if old2 in text:
              text = text.replace(old2, new2)
              patched += 1

          with open(settings_path, 'w') as f:
              f.write(text)
          print(f"Patched {patched} autolinking calls in settings.gradle")

          # Show the patched section
          for line in text.split('\n'):
              if 'autolinkLibraries' in line:
                  print(f"  {line.strip()}")
          PY
      - name: Register gesture-handler native package in MainApplication
        script: |
          cd apps/mobile
          python3 - <<'PY'
          import glob

          main_apps = glob.glob("android/**/MainApplication.kt", recursive=True)
          if not main_apps:
              print("ERROR: No MainApplication.kt found!")
              exit(1)

          path = main_apps[0]
          print(f"Found: {path}")

          with open(path) as f:
              text = f.read()

          if "RNGestureHandlerPackage" in text:
              print("Already has RNGestureHandlerPackage")
          else:
              # Add import
              import_line = "import com.swmansion.gesturehandler.RNGestureHandlerPackage"
              if "import com.facebook.react.PackageList" in text:
                  text = text.replace(
                      "import com.facebook.react.PackageList",
                      "import com.facebook.react.PackageList\n" + import_line
                  )
              elif "import com.facebook.react.ReactPackage" in text:
                  text = text.replace(
                      "import com.facebook.react.ReactPackage",
                      "import com.facebook.react.ReactPackage\n" + import_line
                  )

              # Add to packages list
              if "PackageList(this).packages.apply {" in text:
                  text = text.replace(
                      "PackageList(this).packages.apply {",
                      "PackageList(this).packages.apply {\n                    add(RNGestureHandlerPackage())"
                  )
                  print("Added RNGestureHandlerPackage to packages list")
              elif "PackageList(this).packages" in text:
                  text = text.replace(
                      "PackageList(this).packages",
                      "(PackageList(this).packages + listOf(RNGestureHandlerPackage()))"
                  )
                  print("Added RNGestureHandlerPackage via listOf")

              with open(path, 'w') as f:
                  f.write(text)

          with open(path) as f:
              print(f.read())
          PY
      - name: Patch proguard rules for native modules
        script: |
          PROGUARD="apps/mobile/android/app/proguard-rules.pro"
          if ! grep -q "reanimated" "$PROGUARD" 2>/dev/null; then
            echo "" >> "$PROGUARD"
            echo "-keep class com.swmansion.reanimated.** { *; }" >> "$PROGUARD"
            echo "-keep class com.swmansion.gesturehandler.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.react.turbomodule.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.hermes.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.jni.** { *; }" >> "$PROGUARD"
            echo "Proguard rules added"
          fi
      - name: Optimize APK size (strip x86 + enable shrink)
        script: |
          cd apps/mobile
          python3 - android/app/build.gradle <<'PY'
          import sys
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()

          # 1. Add ndk abiFilters to strip x86/x86_64 (saves ~60MB)
          if "abiFilters" not in text:
              text = text.replace(
                  "defaultConfig {",
                  'defaultConfig {\n        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a"\n        }',
                  1
              )
              print("Added ndk abiFilters (ARM only)")
          else:
              print("abiFilters already present")

          # 2. Enable shrinkResources for release builds
          if "shrinkResources" not in text:
              text = text.replace(
                  "minifyEnabled true",
                  "minifyEnabled true\n            shrinkResources true"
              )
              # If minifyEnabled wasn't found with true, try enabling both
              if "shrinkResources" not in text and "minifyEnabled" in text:
                  text = text.replace(
                      "minifyEnabled false",
                      "minifyEnabled true\n            shrinkResources true"
                  )
              if "shrinkResources" in text:
                  print("Enabled shrinkResources")
              else:
                  print("Could not inject shrinkResources (minifyEnabled not found)")
          else:
              print("shrinkResources already present")

          with open(gradle, 'w') as f:
              f.write(text)
          print("APK optimization applied")
          PY
      - name: Configure release keystore
        script: |
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/upload-key.keystore
          python3 - apps/mobile/android/app/build.gradle <<'PY'
          import sys, re
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()
          release_block = (
              '        release {\n'
              "            storeFile file('upload-key.keystore')\n"
              '            storePassword "SafePlate2026"\n'
              '            keyAlias "upload"\n'
              '            keyPassword "SafePlate2026"\n'
              '        }\n'
          )
          if "signingConfigs" in text and "release {" not in text.split("signingConfigs")[1].split("buildTypes")[0]:
              text = text.replace("signingConfigs {", "signingConfigs {\n" + release_block, 1)
          elif "signingConfigs" not in text:
              sb = "\n    signingConfigs {\n" + release_block + "    }\n"
              text = text.replace("    buildTypes {", sb + "    buildTypes {")
          text = text.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
          with open(gradle, 'w') as f:
              f.write(text)
          print("Signing config injected")
          PY
      - name: Build release APK
        script: cd apps/mobile/android && ./gradlew assembleRelease
      - name: Verify codegen ran for gesture-handler
        script: |
          cd apps/mobile
          echo "=== Codegen output for gesture-handler ==="
          find android -path "*gesturehandler*" -name "*.java" -o -path "*gesturehandler*" -name "*.kt" | grep -i generated | head -20 || echo "No codegen output found"
          echo ""
          echo "=== Native .so files for gesture-handler ==="
          find android -name "libgesturehandler*" -o -name "*rngesturehandler*" 2>/dev/null | head -10 || echo "No gesture-handler .so files"
    artifacts:
      - apps/mobile/android/app/build/outputs/apk/release/app-release.apk
  android-release-aab:
    name: Android Release AAB (Play Store)
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      groups:
        - keystore
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch Expo FormData crash in winter runtime
        script: |
          python3 - <<'PY'
          import glob, os

          # The EXACT crash: expo/src/winter/runtime.native.ts line 25 does
          # installFormDataPatch(FormData) — a bare global reference that throws
          # ReferenceError in Hermes + New Architecture before InitializeCore runs.
          # Guard it with a typeof check.
          targets = glob.glob("node_modules/expo/src/winter/runtime.native.*")
          targets += glob.glob("node_modules/expo/build/winter/runtime.native.*")
          patched = 0
          for fp in targets:
              with open(fp) as f:
                  text = f.read()
              if "installFormDataPatch(FormData)" in text and "typeof FormData" not in text:
                  new_text = text.replace(
                      "installFormDataPatch(FormData);",
                      "if (typeof FormData !== 'undefined') { installFormDataPatch(FormData); }"
                  )
                  if new_text == text:
                      new_text = text.replace(
                          "installFormDataPatch(FormData)",
                          "(typeof FormData !== 'undefined' && installFormDataPatch(FormData))"
                      )
                  if new_text != text:
                      with open(fp, 'w') as f:
                          f.write(new_text)
                      patched += 1
                      print(f"Patched: {fp}")
                  else:
                      print(f"No change needed: {fp}")
              else:
                  print(f"Already patched or no match: {fp}")
          print(f"Patched {patched} files")
          PY
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Prebuild Android project
        script: |
          cd apps/mobile
          echo "=== Expo autolinking resolve ==="
          npx expo-modules-autolinking resolve --platform android 2>&1 | head -60 || true
          echo ""
          npx expo prebuild --platform android --clean
      - name: Fix autolinking for monorepo
        script: |
          cd apps/mobile
          npx @react-native-community/cli config > android/rn-cli-config.json
          node -e "const c=require('./android/rn-cli-config.json'); console.log('Autolinking deps:', Object.keys(c.dependencies||{}).join(', '))"
          python3 - <<'PY'
          import os
          settings_path = "android/settings.gradle"
          config_path = os.path.abspath("android/rn-cli-config.json")
          with open(settings_path) as f:
              text = f.read()
          patched = 0
          old1 = "ex.autolinkLibrariesFromCommand()"
          new1 = f'ex.autolinkLibrariesFromCommand(["cat", "{config_path}"])'
          if old1 in text:
              text = text.replace(old1, new1)
              patched += 1
          old2 = "ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)"
          new2 = f'ex.autolinkLibrariesFromCommand(["cat", "{config_path}"])'
          if old2 in text:
              text = text.replace(old2, new2)
              patched += 1
          with open(settings_path, 'w') as f:
              f.write(text)
          print(f"Patched {patched} autolinking calls")
          for line in text.split('\n'):
              if 'autolinkLibraries' in line:
                  print(f"  {line.strip()}")
          PY
      - name: Force react-android to 0.81.5 (prevent Maven 0.82 cycle)
        script: |
          cd apps/mobile/android
          python3 - build.gradle <<'PY'
          import sys
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()

          force_block = "\nsubprojects {\n    configurations.all {\n        resolutionStrategy {\n            force 'com.facebook.react:react-android:0.81.5'\n            force 'com.facebook.react:react-native:0.81.5'\n            force 'com.facebook.react:hermes-android:0.81.5'\n        }\n    }\n}\n"
          if 'resolutionStrategy' not in text:
              text += force_block
              print("Added dependency resolution force to root build.gradle")
          else:
              print("resolutionStrategy already present")

          with open(gradle, 'w') as f:
              f.write(text)
          PY
      - name: Ensure newArchEnabled in gradle.properties
        script: |
          cd apps/mobile/android
          if grep -q "newArchEnabled" gradle.properties; then
            echo "newArchEnabled already present"
          else
            echo "" >> gradle.properties
            echo "newArchEnabled=true" >> gradle.properties
            echo "Added newArchEnabled=true"
          fi
          if grep -q "reactNativeArchitectures" gradle.properties; then
            sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=armeabi-v7a,arm64-v8a/' gradle.properties
          else
            echo "reactNativeArchitectures=armeabi-v7a,arm64-v8a" >> gradle.properties
          fi
      - name: Optimize AAB size (strip x86)
        script: |
          cd apps/mobile
          python3 - android/app/build.gradle <<'PY'
          import sys
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()

          if "abiFilters" not in text:
              text = text.replace(
                  "defaultConfig {",
                  'defaultConfig {\n        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a"\n        }',
                  1
              )
              print("Added ndk abiFilters (ARM only)")

          if "shrinkResources" not in text:
              text = text.replace(
                  "minifyEnabled true",
                  "minifyEnabled true\n            shrinkResources true"
              )
              if "shrinkResources" not in text and "minifyEnabled" in text:
                  text = text.replace(
                      "minifyEnabled false",
                      "minifyEnabled true\n            shrinkResources true"
                  )

          with open(gradle, 'w') as f:
              f.write(text)
          print("AAB optimization applied")
          PY
      - name: Register gesture-handler native package in MainApplication
        script: |
          cd apps/mobile
          python3 - <<'PY'
          import glob

          main_apps = glob.glob("android/**/MainApplication.kt", recursive=True)
          if not main_apps:
              print("ERROR: No MainApplication.kt found!")
              exit(1)

          path = main_apps[0]
          print(f"Found: {path}")

          with open(path) as f:
              text = f.read()

          if "RNGestureHandlerPackage" in text:
              print("Already has RNGestureHandlerPackage")
          else:
              import_line = "import com.swmansion.gesturehandler.RNGestureHandlerPackage"
              if "import com.facebook.react.PackageList" in text:
                  text = text.replace(
                      "import com.facebook.react.PackageList",
                      "import com.facebook.react.PackageList\n" + import_line
                  )
              elif "import com.facebook.react.ReactPackage" in text:
                  text = text.replace(
                      "import com.facebook.react.ReactPackage",
                      "import com.facebook.react.ReactPackage\n" + import_line
                  )

              if "PackageList(this).packages.apply {" in text:
                  text = text.replace(
                      "PackageList(this).packages.apply {",
                      "PackageList(this).packages.apply {\n                    add(RNGestureHandlerPackage())"
                  )
                  print("Added RNGestureHandlerPackage to packages list")
              elif "PackageList(this).packages" in text:
                  text = text.replace(
                      "PackageList(this).packages",
                      "(PackageList(this).packages + listOf(RNGestureHandlerPackage()))"
                  )
                  print("Added RNGestureHandlerPackage via listOf")

              with open(path, 'w') as f:
                  f.write(text)

          with open(path) as f:
              print(f.read())
          PY
      - name: Patch proguard rules for native modules
        script: |
          PROGUARD="apps/mobile/android/app/proguard-rules.pro"
          if ! grep -q "reanimated" "$PROGUARD" 2>/dev/null; then
            echo "" >> "$PROGUARD"
            echo "-keep class com.swmansion.reanimated.** { *; }" >> "$PROGUARD"
            echo "-keep class com.swmansion.gesturehandler.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.react.turbomodule.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.hermes.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.jni.** { *; }" >> "$PROGUARD"
            echo "Proguard rules added"
          else
            echo "Proguard rules already present"
          fi
      - name: Configure release keystore
        script: |
          if [ -z "$CM_KEYSTORE_BASE64" ]; then echo "Missing CM_KEYSTORE_BASE64"; exit 1; fi
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/upload-key.keystore
          echo "Keystore decoded successfully"
          GRADLE_FILE="apps/mobile/android/app/build.gradle"
          cat > /tmp/inject_signing.py << 'PYEOF'
          import sys, re
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()
          release_block = (
              '        release {\n'
              "            storeFile file('upload-key.keystore')\n"
              '            storePassword "SafePlate2026"\n'
              '            keyAlias "upload"\n'
              '            keyPassword "SafePlate2026"\n'
              '        }\n'
          )
          if "signingConfigs" in text and "release {" not in text.split("signingConfigs")[1].split("buildTypes")[0]:
              text = text.replace("signingConfigs {", "signingConfigs {\n" + release_block, 1)
              print("Added release to existing signingConfigs")
          elif "signingConfigs" not in text:
              sb = "\n    signingConfigs {\n" + release_block + "    }\n"
              text = text.replace("    buildTypes {", sb + "    buildTypes {")
              print("Added new signingConfigs block")
          else:
              print("Release signing config already exists")
          text = text.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release"
          )
          with open(gradle, 'w') as f:
              f.write(text)
          print("Signing config injected into build.gradle")
          PYEOF
          python3 /tmp/inject_signing.py "$GRADLE_FILE"
      - name: Build release AAB
        script: cd apps/mobile/android && ./gradlew bundleRelease
    artifacts:
      - apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
