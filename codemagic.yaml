workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Prebuild Android project
        script: cd apps/mobile && npx expo prebuild --platform android --clean
      - name: Build debug APK
        script: cd apps/mobile/android && ./gradlew assembleDebug
    artifacts:
      - apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
  android-release:
    name: Android Release APK (debug signed)
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Prebuild Android project
        script: cd apps/mobile && npx expo prebuild --platform android --clean
      - name: Build release APK
        script: cd apps/mobile/android && ./gradlew assembleRelease
    artifacts:
      - apps/mobile/android/app/build/outputs/apk/release/app-release.apk
  android-release-aab:
    name: Android Release AAB (Play Store)
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      groups:
        - keystore
      vars:
        EXPO_PUBLIC_API_BASE: "https://api.safe-plate.ai"
        EXPO_USE_COMMUNITY_AUTOLINKING: "1"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install mobile deps locally
        script: |
          cd apps/mobile
          mkdir -p node_modules
          # Copy (not symlink) native packages so autolinking finds them
          NATIVE_PKGS="react-native-gesture-handler react-native-reanimated react-native-worklets react-native-screens react-native-safe-area-context react-native-svg"
          for pkg in $NATIVE_PKGS; do
            if [ ! -d "node_modules/$pkg" ] && [ -d "../../node_modules/$pkg" ]; then
              cp -R "../../node_modules/$pkg" "node_modules/$pkg"
              echo "Copied $pkg"
            else
              echo "Already exists or not found: $pkg"
            fi
          done
          # Copy scoped native packages
          for pkg in @react-native-async-storage/async-storage @react-native-community/slider @react-native-community/datetimepicker; do
            SCOPE=$(echo $pkg | cut -d'/' -f1)
            NAME=$(echo $pkg | cut -d'/' -f2)
            mkdir -p "node_modules/$SCOPE"
            if [ ! -d "node_modules/$pkg" ] && [ -d "../../node_modules/$pkg" ]; then
              cp -R "../../node_modules/$pkg" "node_modules/$SCOPE/$NAME"
              echo "Copied $pkg"
            else
              echo "Already exists or not found: $pkg"
            fi
          done
          echo "=== node_modules contents ==="
          ls -la node_modules/ | head -30
      - name: Patch Expo Gradle compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path
          patched = 0
          for gradle_file in Path("node_modules").glob("expo-*/android/build.gradle"):
            text = gradle_file.read_text()
            next_text = text.replace("classifier = 'sources'", "archiveClassifier.set('sources')")
            next_text = next_text.replace('classifier = "sources"', 'archiveClassifier.set("sources")')
            if next_text != text:
              gradle_file.write_text(next_text)
              patched += 1
          print(f"Patched {patched} expo android build.gradle files")
          PY
      - name: Build shared package
        script: cd packages/shared && npm run build
      - name: Verify RN config before prebuild
        script: |
          cd apps/mobile
          echo "=== react-native.config.js dependencies ==="
          node -e "const c = require('./react-native.config.js'); console.log(Object.keys(c.dependencies).join('\n'))"
          echo ""
          echo "=== Community CLI config (gesture handler check) ==="
          npx react-native config 2>&1 | grep -A2 "gesture-handler" | head -10 || echo "WARNING: gesture handler not in RN config"
          echo ""
          echo "=== Expo autolinking resolve ==="
          npx expo-modules-autolinking resolve --platform android 2>&1 | head -40 || true
      - name: Prebuild Android project
        script: cd apps/mobile && npx expo prebuild --platform android --clean
      - name: Force-inject native modules into Android build
        script: |
          python3 - <<'PY'
          import os, re, glob

          ANDROID_DIR = "apps/mobile/android"
          SETTINGS = os.path.join(ANDROID_DIR, "settings.gradle")
          APP_GRADLE = os.path.join(ANDROID_DIR, "app", "build.gradle")

          # Native RN packages that must be in the build
          NATIVE_PACKAGES = {
              "react-native-gesture-handler": {
                  "path": "../../../node_modules/react-native-gesture-handler/android",
                  "local_path": "../node_modules/react-native-gesture-handler/android",
                  "java_package": "com.swmansion.gesturehandler.RNGestureHandlerPackage",
                  "java_import": "com.swmansion.gesturehandler",
              },
              "react-native-reanimated": {
                  "path": "../../../node_modules/react-native-reanimated/android",
                  "local_path": "../node_modules/react-native-reanimated/android",
                  "java_package": "com.swmansion.reanimated.ReanimatedPackage",
                  "java_import": "com.swmansion.reanimated",
              },
              "react-native-worklets": {
                  "path": "../../../node_modules/react-native-worklets/android",
                  "local_path": "../node_modules/react-native-worklets/android",
                  "java_package": "com.swmansion.worklets.WorkletsPackage",
                  "java_import": "com.swmansion.worklets",
              },
              "react-native-screens": {
                  "path": "../../../node_modules/react-native-screens/android",
                  "local_path": "../node_modules/react-native-screens/android",
                  "java_package": "com.swmansion.rnscreens.RNScreensPackage",
                  "java_import": "com.swmansion.rnscreens",
              },
              "react-native-safe-area-context": {
                  "path": "../../../node_modules/react-native-safe-area-context/android",
                  "local_path": "../node_modules/react-native-safe-area-context/android",
                  "java_package": "com.th3rdwave.safeareacontext.SafeAreaContextPackage",
                  "java_import": "com.th3rdwave.safeareacontext",
              },
              "react-native-svg": {
                  "path": "../../../node_modules/react-native-svg/android",
                  "local_path": "../node_modules/react-native-svg/android",
                  "java_package": "com.horcrux.svg.SvgPackage",
                  "java_import": "com.horcrux.svg",
              },
          }

          # --- 1. Check and patch settings.gradle ---
          with open(SETTINGS) as f:
              settings_text = f.read()

          print("=== settings.gradle BEFORE patch ===")
          print(settings_text[:2000])

          injected_settings = []
          for pkg_name, info in NATIVE_PACKAGES.items():
              gradle_name = ":" + pkg_name.replace("/", "_")
              if pkg_name not in settings_text:
                  # Use local copy first, fall back to root
                  local_android = os.path.join(ANDROID_DIR, "..", "node_modules", pkg_name, "android")
                  root_android = os.path.join("node_modules", pkg_name, "android")
                  if os.path.isdir(local_android):
                      use_path = info["local_path"]
                  elif os.path.isdir(root_android):
                      use_path = info["path"]
                  else:
                      print(f"WARNING: {pkg_name} android dir not found!")
                      continue
                  line = f"\ninclude '{gradle_name}'\nproject('{gradle_name}').projectDir = new File(rootProject.projectDir, '{use_path}')\n"
                  settings_text += line
                  injected_settings.append(pkg_name)

          if injected_settings:
              with open(SETTINGS, 'w') as f:
                  f.write(settings_text)
              print(f"\nInjected into settings.gradle: {injected_settings}")
          else:
              print("\nAll native packages already in settings.gradle")

          # --- 2. Check and patch app/build.gradle dependencies ---
          with open(APP_GRADLE) as f:
              app_text = f.read()

          injected_deps = []
          for pkg_name in NATIVE_PACKAGES:
              gradle_name = ":" + pkg_name.replace("/", "_")
              if gradle_name not in app_text and pkg_name not in app_text:
                  dep_line = f'    implementation project("{gradle_name}")\n'
                  # Add before the last closing brace of dependencies block
                  app_text = app_text.replace(
                      "\n}\n\napply from",
                      f"\n{dep_line}}}\n\napply from",
                      1
                  )
                  if dep_line.strip() not in app_text:
                      # Fallback: find dependencies { ... } block and append
                      app_text = re.sub(
                          r'(dependencies\s*\{)',
                          r'\1\n' + dep_line,
                          app_text,
                          count=1
                      )
                  injected_deps.append(pkg_name)

          if injected_deps:
              with open(APP_GRADLE, 'w') as f:
                  f.write(app_text)
              print(f"Injected into app/build.gradle: {injected_deps}")
          else:
              print("All native packages already in app/build.gradle")

          # --- 3. Check PackageList for gesture handler ---
          plist_files = glob.glob(os.path.join(ANDROID_DIR, "**", "PackageList.java"), recursive=True)
          plist_files += glob.glob(os.path.join(ANDROID_DIR, "**", "PackageList.kt"), recursive=True)
          if plist_files:
              print(f"\nPackageList found: {plist_files[0]}")
              with open(plist_files[0]) as f:
                  plist_text = f.read()
              if "gesturehandler" in plist_text.lower() or "GestureHandler" in plist_text:
                  print("gesture handler IS in PackageList")
              else:
                  print("WARNING: gesture handler NOT in PackageList — will be added by Gradle autolinking at build time")
          else:
              print("\nNo PackageList found (will be auto-generated by Gradle)")

          print("\n=== settings.gradle AFTER patch ===")
          with open(SETTINGS) as f:
              print(f.read()[-1500:])

          print("\n=== DONE ===")
          PY
      - name: Patch proguard rules for native modules
        script: |
          PROGUARD="apps/mobile/android/app/proguard-rules.pro"
          if ! grep -q "reanimated" "$PROGUARD" 2>/dev/null; then
            echo "" >> "$PROGUARD"
            echo "# react-native-reanimated" >> "$PROGUARD"
            echo "-keep class com.swmansion.reanimated.** { *; }" >> "$PROGUARD"
            echo "# react-native-gesture-handler" >> "$PROGUARD"
            echo "-keep class com.swmansion.gesturehandler.** { *; }" >> "$PROGUARD"
            echo "# TurboModules" >> "$PROGUARD"
            echo "-keep class com.facebook.react.turbomodule.** { *; }" >> "$PROGUARD"
            echo "# Hermes" >> "$PROGUARD"
            echo "-keep class com.facebook.hermes.** { *; }" >> "$PROGUARD"
            echo "-keep class com.facebook.jni.** { *; }" >> "$PROGUARD"
            echo "Proguard rules added"
          else
            echo "Proguard rules already present"
          fi
      - name: Configure release keystore
        script: |
          if [ -z "$CM_KEYSTORE_BASE64" ]; then echo "Missing CM_KEYSTORE_BASE64"; exit 1; fi
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/upload-key.keystore
          echo "Keystore decoded successfully"
          GRADLE_FILE="apps/mobile/android/app/build.gradle"
          cat > /tmp/inject_signing.py << 'PYEOF'
          import sys, re
          gradle = sys.argv[1]
          with open(gradle) as f:
              text = f.read()
          release_block = (
              '        release {\n'
              "            storeFile file('upload-key.keystore')\n"
              '            storePassword "SafePlate2026"\n'
              '            keyAlias "upload"\n'
              '            keyPassword "SafePlate2026"\n'
              '        }\n'
          )
          if "signingConfigs" in text and "release {" not in text.split("signingConfigs")[1].split("buildTypes")[0]:
              text = text.replace("signingConfigs {", "signingConfigs {\n" + release_block, 1)
              print("Added release to existing signingConfigs")
          elif "signingConfigs" not in text:
              sb = "\n    signingConfigs {\n" + release_block + "    }\n"
              text = text.replace("    buildTypes {", sb + "    buildTypes {")
              print("Added new signingConfigs block")
          else:
              print("Release signing config already exists")
          text = text.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release"
          )
          with open(gradle, 'w') as f:
              f.write(text)
          print("Signing config injected into build.gradle")
          PYEOF
          python3 /tmp/inject_signing.py "$GRADLE_FILE"
      - name: Build release AAB
        script: cd apps/mobile/android && ./gradlew bundleRelease
    artifacts:
      - apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
